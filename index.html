<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <nav>
        <div class="right" id="logo">TO-DO List</div>
        <div class="left">
          <button id="toggleButton">Add new task</button>
        </div>
      </nav>
      <section class="board">
        <div id="todo" class="task-column">
          <div class="heading">
            <div class="left" id="left-todo">To DO</div>
            <div id="todoCount" class="right">0</div>
          </div>
        </div>
        <div id="progress" class="task-column">
          <div class="heading">
            <div class="left" id="left-in-progress">In Progress</div>
            <div class="right">0</div>
          </div>
        </div>
        <div id="done" class="task-column">
          <div class="heading">
            <div class="left" id="left-done">Done</div>
            <div class="right">0</div>
          </div>
        </div>
      </section>
    </div>
    <div class="modal  add-new-task">
        <div class="bg"></div>
        <div class="center">
        <input type="text" id="titleInput" placeholder="Task Title">
        <textarea name="" id="deskInput" placeholder="Task Description"></textarea>
        <button id="add-new-task" class="add-task-btn">Add Task</button>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
