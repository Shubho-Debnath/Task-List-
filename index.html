<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Sprint Board</title>
    <!-- SortableJS CDN — REQUIRED for drag & drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <link rel="stylesheet" href="css/theme-system.css" />
    <link rel="stylesheet" href="css/columns-grid.css" />
    <link rel="stylesheet" href="css/task-card.css" />
  </head>
  <body>
    <div class="board">
      <div class="board__card" id="boardCard">
        <div class="board__header">
          <div class="board__title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <h1>AI Sprint Board</h1>
          </div>
          <div class="board__meta">
            <span class="board__badge">Sprint 14</span>
            <span class="board__date">Mar 24 – Apr 7</span>
            <button class="board__theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
          </div>
        </div>

        <div class="columns" id="columns"></div>

        <div class="board__footer">
          <span class="board__footer-count" id="footerCount"></span>
          <span class="board__footer-dot">·</span>
          <span class="board__footer-members">5 members</span>
        </div>
      </div>
    </div>

    <!-- JS files — order matters -->
    <script src="js/task-data.js"></script>
    <script src="js/render-engine.js"></script>
    <script src="js/sortable-setup.js"></script>
  </body>
</html>
